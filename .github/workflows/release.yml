name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v0.1.140'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Prepare version metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ steps.ref.outputs.tag }}"
          VERSION="${TAG_NAME#v}"
          BASE_VERSION="${VERSION%%-*}"
          echo "$BASE_VERSION" > backend/cmd/server/VERSION

          git remote add upstream https://github.com/Wei-Shaw/sub2api.git || true
          git fetch upstream main:refs/remotes/upstream/main --tags --force || true
          UPSTREAM_COMMIT=$(git merge-base HEAD refs/remotes/upstream/main || true)
          if [ -z "$UPSTREAM_COMMIT" ]; then UPSTREAM_COMMIT=unknown; fi
          echo "$UPSTREAM_COMMIT" > backend/cmd/server/UPSTREAM_COMMIT

          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=$UPSTREAM_COMMIT" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"
          echo "Program version: $BASE_VERSION"
          echo "Upstream commit: $UPSTREAM_COMMIT"
          echo "Build date: $BUILD_DATE"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version | grep -q 'go1.26.4'

      - name: Build Linux amd64 binary
        working-directory: backend
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p ../dist/linux-amd64
          go build -tags embed -trimpath \
            -ldflags "-s -w -X main.Commit=${GITHUB_SHA} -X main.UpstreamCommit=${{ steps.meta.outputs.upstream_commit }} -X main.Date=${{ steps.meta.outputs.build_date }} -X main.BuildType=release" \
            -o ../dist/linux-amd64/sub2api ./cmd/server

      - name: Package artifact
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          cd dist/linux-amd64
          chmod +x sub2api
          tar -czf "../sub2api_${VERSION}_linux_amd64.tar.gz" sub2api
          cd ..
          sha256sum "sub2api_${VERSION}_linux_amd64.tar.gz" > checksums.txt
          ls -lh
          cat checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          name: Sub2API ${{ steps.meta.outputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
          body: |
            ## Sub2API ${{ steps.meta.outputs.version }}

            Linux x86_64 binary release for sub2api-so-fy. Program internal version: `${{ steps.meta.outputs.base_version }}`.

            ### Server upgrade

            ```bash
            cd /opt/sub2api
            mkdir -p /tmp/sub2api-upgrade
            wget -O /tmp/sub2api-upgrade/sub2api_${{ steps.meta.outputs.version }}_linux_amd64.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ steps.ref.outputs.tag }}/sub2api_${{ steps.meta.outputs.version }}_linux_amd64.tar.gz
            tar -xzf /tmp/sub2api-upgrade/sub2api_${{ steps.meta.outputs.version }}_linux_amd64.tar.gz -C /tmp/sub2api-upgrade
            ts=$(date +%F_%H%M%S)
            cp -a /opt/sub2api/sub2api /opt/sub2api/sub2api.before-fy-$ts
            systemctl stop sub2api
            mv /tmp/sub2api-upgrade/sub2api /opt/sub2api/sub2api
            chmod +x /opt/sub2api/sub2api
            systemctl start sub2api
            ```
          files: |
            dist/sub2api_${{ steps.meta.outputs.version }}_linux_amd64.tar.gz
            dist/checksums.txt

